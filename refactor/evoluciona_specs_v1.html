<script>
var TC='#1D9E75',TL='rgba(29,158,117,0.09)',TT='#0F6E56';
var DC='#D85A30',DL='rgba(216,90,48,0.09)',DT='#712B13';

function sk(w){return '<div style="height:8px;border-radius:2px;background:var(--color-background-secondary);width:'+(w||'80%')+';margin-bottom:4px;"></div>';}

function wb(lbl,s,inner){
  return '<div style="border:0.5px dashed var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);padding:6px;'+(s||'')+'">'+(lbl?'<div style="font-size:9px;color:var(--color-text-tertiary);margin-bottom:4px;">'+lbl+'</div>':'')+(inner||'')+'</div>';
}

function cb(lbl,c,bg,s,inner){
  return '<div style="border:0.5px dashed '+c+';border-radius:4px;background:'+bg+';padding:6px;'+(s||'')+'"><div style="font-size:9px;color:'+c+';font-weight:500;margin-bottom:4px;">'+lbl+'</div>'+(inner||'')+'</div>';
}

function tbar(tabs,ai,c,bg){
  var items=tabs.map(function(t,i){return '<div style="flex:1;padding:5px;text-align:center;font-size:9px;color:'+(i===ai?c:'var(--color-text-tertiary)')+';background:'+(i===ai?bg:'var(--color-background-primary)')+';'+(i>0?'border-left:0.5px solid var(--color-border-tertiary);':'')+'">' +t+'</div>';});

}

function dots(ps,done,c){
  var out='<div style="display:flex;align-items:center;">';
  for(var i=0;i<ps.length;i++){
    out+='<div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="width:12px;height:12px;border-radius:50%;background:'+(i<done?c:'var(--color-background-secondary)')+';border:1.5px solid '+(i<=done?c:'var(--color-border-secondary)')+';flex-shrink:0;"></div><span style="font-size:8px;color:'+(i<done?c:'var(--color-text-tertiary)')+';">'+ps[i]+'</span></div>';
    if(i<ps.length-1) out+='<div style="flex:1;height:1.5px;background:'+(i<done?c:'var(--color-border-secondary)')+';margin-top:-14px;"></div>';
  }
  return out+'</div>';
}

  }
  return '<div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;background:var(--color-background-secondary);">'
    +'<div style="height:28px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 10px;gap:6px;">'

    +'<span style="font-size:9px;font-weight:500;color:var(--color-text-tertiary);flex:1;">EvolucionaOS</span>'
    +'<div style="width:14px;height:14px;border-radius:50%;background:'+abg+';border:0.5px solid '+ac+';"></div>'

  var h='<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;"><div style="font-size:10px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;">'+title+'</div>';

    var it=items[i];
    if(typeof it==='object'){
      var cl=i===0?color:i===1?color+'99':'var(--color-border-secondary)';
      var lb=['Primario','Secundario','Terciario'][i];
      h+='<div style="display:flex;gap:7px;align-items:flex-start;margin-bottom:8px;"><div style="width:7px;height:7px;border-radius:50%;background:'+cl+';flex-shrink:0;margin-top:4px;"></div><div><div style="font-size:11px;font-weight:500;color:var(--color-text-primary);margin-bottom:1px;">'+lb+'</div><div style="font-size:12px;color:var(--color-text-secondary);">'+it.t+'</div></div></div>';
    } else {
      h+='<div style="font-size:12px;color:var(--color-text-secondary);padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary);">'+it+'</div>';
    }
  }
  return h+'</div>';
}

function go(idx){
  var btns=document.querySelectorAll('.sb');
  for(var i=0;i<btns.length;i++) btns[i].classList.toggle('on',i===idx);
  var s=SCREENS[idx];
  var rp=document.getElementById('rp');
  if(!rp||!s) return;
  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;">'
    +'<code style="font-size:13px;font-weight:500;background:var(--color-background-secondary);padding:4px 12px;border-radius:6px;color:var(--color-text-primary);">'+s.url+'</code>'
    +'<span style="font-size:11px;padding:3px 10px;border-radius:10px;background:'+(s.role==='c'?TL:DL)+';color:'+(s.role==='c'?TT:DT)+';font-weight:500;">'+(s.role==='c'?'cliente':'director')+'</span>'
    +'</div>';
  var g='<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:1rem;">'
    +mkCard('Componentes visibles',s.comp,s.color)
    +mkCard('Jerarqu\xEDa visual',s.hier,s.color)
    +mkCard('Acciones del usuario',s.act,s.color)
    +'</div>';
  rp.innerHTML=h+s.wf+g;
}
